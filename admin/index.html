<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — éPure Drive</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255,255,255,0.08);
      --accent: #c9a84c;
      --text: #f0f0f0;
      --muted: #777;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 60%);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo-wrap img { height: 36px; }
    .logo-wrap p {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.6rem;
    }
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.45rem;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 0.875rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .error {
      color: #f87171;
      font-size: 0.82rem;
      margin-top: 1rem;
      text-align: center;
      padding: 0.6rem;
      background: rgba(248,113,113,0.08);
      border-radius: 8px;
      display: none;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 1.75rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: var(--text); }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-google {
      width: 100%;
      padding: 0.8rem;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 0;
    }
    .btn-google:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); }
    .btn-google:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="../assets/logo.png" alt="éPure Drive">
      <p>Admin Panel</p>
    </div>

    <!-- Google login -->
    <button class="btn-google" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or sign in with email</div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@epuredrive.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn" id="login-btn">Sign In</button>
      <div class="error" id="error-msg"></div>
    </form>

    <a href="../index.html" class="back">← Back to website</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://brwzjwbpguiignrxvjdc.supabase.co',
      'sb_publishable_krEuIpNhJVcADIUyBXYy9g_fiXrXzV9'
    );

    // Handle OAuth redirect (Google login callback)
    sb.auth.onAuthStateChange((event, session) => {
      if (session) window.location.href = 'dashboard.html';
    });

    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'dashboard.html';
    });

    // Google OAuth
    document.getElementById('google-btn').addEventListener('click', async () => {
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.lastChild.textContent = ' Redirecting to Google…';
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/admin/dashboard.html',
        },
      });
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });

      if (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
