<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — éPure Drive</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#e6e8ea",
                        "error": "#ba1a1a",
                        "surface": "#f7f9fb",
                        "surface-container-low": "#f2f4f6",
                        "outline-variant": "#c6c6cd",
                        "inverse-surface": "#2d3133",
                        "secondary": "#006c49",
                        "on-error": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "primary-container": "#111c2d",
                        "primary-fixed": "#d8e3fb",
                        "surface-variant": "#e0e3e5",
                        "background": "#f7f9fb",
                        "tertiary-fixed": "#ffddb8",
                        "on-background": "#191c1e",
                        "secondary-container": "#6cf8bb",
                        "inverse-on-surface": "#eff1f3",
                        "primary": "#000000",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary-fixed": "#111c2d",
                        "surface-container": "#eceef0",
                        "on-surface": "#191c1e",
                        "outline": "#76777d",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"] },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"}
                }
            }
        }
  </script>
  <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      body { font-family: 'Inter', sans-serif; background: #f3f4f6; color: #111827; }
      h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">

  <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-[20px] shadow-xl shadow-blue-900/5 p-10 w-full max-w-md">
    
    <div class="text-center mb-8">
      <img src="../assets/logo.png" alt="éPure Drive" class="h-10 mx-auto">
      <p class="text-[11px] font-bold text-primary-container/60 uppercase tracking-widest mt-3">Admin Portal</p>
    </div>

    <!-- Tabs -->
    <div class="flex bg-surface-container-low rounded-xl p-1 mb-8">
      <button class="tab-btn active flex-1 py-2 text-sm font-semibold rounded-lg text-primary bg-white shadow-sm transition-all" data-tab="login">Sign In</button>
      <button class="tab-btn flex-1 py-2 text-sm font-semibold rounded-lg text-on-surface-variant hover:text-primary transition-all" data-tab="register">Create Account</button>
    </div>

    <!-- Sign In Panel -->
    <div class="tab-panel active" id="panel-login">
      <button class="w-full bg-white border border-outline-variant/40 hover:bg-surface-container-low text-on-surface rounded-xl py-3 text-sm font-bold flex items-center justify-center gap-3 transition-all shadow-sm" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="flex items-center gap-3 my-6 text-xs text-outline font-medium uppercase tracking-widest">
        <div class="flex-1 h-px bg-outline-variant/40"></div>
        or sign in with email
        <div class="flex-1 h-px bg-outline-variant/40"></div>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Email</label>
          <input type="email" id="login-email" placeholder="admin@epuredrive.com" required autocomplete="email" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary-container/20 transition-all placeholder:text-outline-variant" />
        </div>
        <div>
          <label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary-container/20 transition-all placeholder:text-outline-variant" />
        </div>
        <button type="submit" class="w-full bg-primary-container text-white py-3 rounded-xl text-sm font-bold mt-2 hover:bg-primary transition-colors" id="login-btn">Sign In</button>
        <div class="hidden text-xs bg-error-container text-on-error-container p-3 rounded-lg text-center font-medium" id="login-error"></div>
      </form>
    </div>

    <!-- Create Account Panel -->
    <div class="tab-panel" id="panel-register">
      <form id="register-form" class="space-y-4">
        <div>
          <label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name" required autocomplete="name" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary-container/20 transition-all" />
        </div>
        <div>
          <label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Fleet / Company Name</label>
          <input type="text" id="reg-company" placeholder="e.g. Sunset Rentals" required class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary-container/20 transition-all" />
          <div class="text-[10px] text-outline mt-1 font-medium">This will be your account name.</div>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Email</label>
          <input type="email" id="reg-email" placeholder="you@company.com" required autocomplete="email" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary-container/20 transition-all" />
        </div>
        <div>
          <label class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Password</label>
          <input type="password" id="reg-password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary-container/20 transition-all" />
        </div>
        <button type="submit" class="w-full bg-primary-container text-white py-3 rounded-xl text-sm font-bold mt-2 hover:bg-primary transition-colors" id="reg-btn">Create Account</button>
        <div class="hidden text-xs bg-error-container text-on-error-container p-3 rounded-lg text-center font-medium" id="reg-error"></div>
        <div class="hidden text-xs bg-secondary-container text-on-secondary-container p-3 rounded-lg text-center font-medium" id="reg-success"></div>
      </form>
    </div>

    <a href="../index.html" class="block text-center mt-8 text-sm font-semibold text-outline-variant hover:text-primary transition-colors">← Back to website</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://brwzjwbpguiignrxvjdc.supabase.co',
      'sb_publishable_krEuIpNhJVcADIUyBXYy9g_fiXrXzV9'
    );

    // ---- Tab switching ----
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // Reset classes
        document.querySelectorAll('.tab-btn').forEach(b => {
           b.classList.remove('bg-white', 'shadow-sm', 'text-primary');
           b.classList.add('text-on-surface-variant');
        });
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        
        // Add active classes
        btn.classList.add('bg-white', 'shadow-sm', 'text-primary');
        btn.classList.remove('text-on-surface-variant');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ---- Redirect if already logged in ----
    sb.auth.onAuthStateChange((event, session) => {
      if (session) window.location.href = 'dashboard.html';
    });
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'dashboard.html';
    });

    // ---- Google OAuth ----
    document.getElementById('google-btn').addEventListener('click', async () => {
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.innerHTML = 'Redirecting to Google…';
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/admin/dashboard.html' },
      });
    });

    // ---- Email Sign In ----
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value,
      });

      if (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('reg-btn');
      const err = document.getElementById('reg-error');
      const suc = document.getElementById('reg-success');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      err.style.display = 'none';
      suc.style.display = 'none';

      const pwd = document.getElementById('reg-password').value;
      if (pwd.length < 8) {
        err.textContent = 'Password must be at least 8 characters.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      const email   = document.getElementById('reg-email').value.trim();
      const name    = document.getElementById('reg-name').value.trim();
      const company = document.getElementById('reg-company').value.trim();

      const { data, error } = await sb.auth.signUp({
        email,
        password: pwd,
        options: { data: { full_name: name } }
      });

      if (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      } else {
        // Create tenant + profile via server function (bypasses RLS)
        try {
          const userId = data.user?.id;
          if (userId) {
            await fetch('/api/tenant/create', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId, email, company: company || name || email.split('@')[0] }),
            });
          }
        } catch (_) { /* non-fatal — onboarding wizard will handle it */ }

        suc.textContent = 'Account created successfully! Redirecting...';
        suc.style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      }
    });
  </script>
</body>
</html>
