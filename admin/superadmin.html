<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — éPure Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f3f4f6; --surface: #ffffff; --surface-2: #f9fafb;
    --border: rgba(0,0,0,0.08); --text: #111827; --muted: #6b7280;
    --accent: #111c2d; --red: #EF4444; --green: #10B981; --gold: #F59E0B;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-family: 'Manrope', sans-serif; font-size: 1.15rem; font-weight: 800; letter-spacing: -0.01em; }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .user-chip { font-size: 0.8rem; color: var(--muted); }
  .back-link { font-size: 0.82rem; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
  .back-link:hover { color: var(--text); }

  .content { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.25rem; }
  .stat-box-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.4rem; }
  .stat-box-val { font-size: 1.7rem; font-weight: 700; font-family: 'Manrope', sans-serif; }

  .filters { display: flex; gap: 0.65rem; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .search-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.9rem; font-family: inherit; font-size: 0.85rem; outline: none; width: 240px; }
  .search-input:focus { border-color: var(--accent); }
  .filter-sel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; font-family: inherit; font-size: 0.82rem; cursor: pointer; outline: none; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 0.65rem 1rem; text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); background: var(--surface-2); border-bottom: 1px solid var(--border); }
  tbody td { padding: 0.85rem 1rem; font-size: 0.84rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(0,0,0,0.01); }

  .plan-badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .plan-trial    { background: rgba(245,158,11,0.15);  color: #B45309; }
  .plan-starter  { background: rgba(99,102,241,0.15);  color: #4338CA; }
  .plan-pro      { background: rgba(16,185,129,0.15);  color: #065F46; }
  .plan-suspended{ background: rgba(239,68,68,0.15);   color: #DC2626; }

  .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 0.9rem; border-radius: 7px; font-family: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s; text-decoration: none; }
  .btn:hover { opacity: 0.82; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { color: var(--text); }
  .btn-danger  { background: rgba(239,68,68,0.12); color: var(--red); }
  .btn-green   { background: rgba(16,185,129,0.12); color: #065F46; }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
  .modal-box { background: var(--surface); border-radius: 16px; padding: 1.75rem; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal-header h3 { font-size: 1rem; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
  .form-group { margin-bottom: 0.85rem; }
  .form-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.35rem; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.6rem 0.85rem; font-family: inherit; font-size: 0.87rem; color: var(--text); outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 0.65rem; margin-top: 1.25rem; }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1E293B; color: #fff; padding: 0.65rem 1.1rem; border-radius: 10px; font-size: 0.85rem; box-shadow: 0 4px 20px rgba(0,0,0,.3); z-index: 9999; opacity: 0; transform: translateY(8px); transition: opacity .25s, transform .25s; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--red); }

  #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  #loading-overlay span { font-size: 1rem; color: var(--muted); }

  @media (max-width: 900px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .content { padding: 1rem; }
  }
</style>
</head>
<body>

<div id="loading-overlay"><span>Verifying access…</span></div>

<!-- TOPBAR -->
<header class="topbar">
  <div style="display:flex;align-items:center;gap:1.5rem;">
    <h1>éPure Drive <span style="color:#818CF8;font-weight:400;font-size:0.9rem;">Super Admin</span></h1>
    <a href="dashboard.html" class="back-link">
      <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span> Back to Dashboard
    </a>
  </div>
  <div class="topbar-right">
    <span class="user-chip" id="sa-user-email">—</span>
    <button class="btn btn-outline" id="sa-logout-btn">Logout</button>
  </div>
</header>

<div class="content">

  <!-- Summary cards -->
  <div class="stat-grid" id="stat-grid">
    <div class="stat-box"><div class="stat-box-label">Total Clients</div><div class="stat-box-val" id="sa-total">—</div></div>
    <div class="stat-box"><div class="stat-box-label">Trial</div><div class="stat-box-val" id="sa-trial" style="color:var(--gold);">—</div></div>
    <div class="stat-box"><div class="stat-box-label">Starter</div><div class="stat-box-val" id="sa-starter" style="color:#818CF8;">—</div></div>
    <div class="stat-box"><div class="stat-box-label">Pro</div><div class="stat-box-val" id="sa-pro" style="color:var(--green);">—</div></div>
    <div class="stat-box"><div class="stat-box-label">Suspended</div><div class="stat-box-val" id="sa-suspended" style="color:var(--red);">—</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input type="text" class="search-input" id="sa-search" placeholder="Search company, email, slug…" oninput="filterTable()" />
    <select class="filter-sel" id="sa-plan-filter" onchange="filterTable()">
      <option value="">All Plans</option>
      <option value="trial">Trial</option>
      <option value="starter">Starter</option>
      <option value="pro">Pro</option>
      <option value="suspended">Suspended</option>
    </select>
    <button class="btn btn-primary" onclick="loadTenants()" style="margin-left:auto;">
      <span class="material-symbols-outlined" style="font-size:15px;">refresh</span> Refresh
    </button>
  </div>

  <!-- Clients table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Company</th>
          <th>Owner</th>
          <th>Plan</th>
          <th>Trial</th>
          <th>Cars</th>
          <th>Bookings</th>
          <th>Rev (MTD)</th>
          <th>Last Booking</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="sa-tbody">
        <tr><td colspan="10" style="text-align:center;color:var(--muted);padding:3rem;">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div><!-- /content -->

<!-- MODAL: Edit Tenant -->
<div class="modal" id="edit-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="edit-modal-title">Edit Client</h3>
      <button class="modal-close" onclick="closeModal('edit-modal')">✕</button>
    </div>
    <form id="edit-form">
      <input type="hidden" id="edit-tenant-id" />
      <div class="form-group">
        <label>Company Name</label>
        <input type="text" id="edit-name" placeholder="Fleet company name" />
      </div>
      <div class="form-group">
        <label>Owner Name</label>
        <input type="text" id="edit-owner-name" placeholder="Full name of account owner" />
      </div>
      <div class="form-group">
        <label>Owner Email</label>
        <input type="email" id="edit-owner-email" placeholder="contact@company.com" />
      </div>
      <div class="form-group">
        <label>Owner Phone</label>
        <input type="tel" id="edit-owner-phone" placeholder="+1 (305) 000-0000" />
      </div>
      <div class="form-group">
        <label>Plan</label>
        <select id="edit-plan">
          <option value="trial">Trial</option>
          <option value="starter">Starter — $49/mo</option>
          <option value="pro">Pro — $99/mo</option>
          <option value="suspended">Suspended</option>
        </select>
      </div>
      <div class="form-group">
        <label>Internal Notes</label>
        <textarea id="edit-notes" placeholder="Notes about this client (not visible to them)…"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('edit-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="edit-submit-btn">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://brwzjwbpguiignrxvjdc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_krEuIpNhJVcADIUyBXYy9g_fiXrXzV9';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allTenants   = [];
let accessToken  = null;

// ── Auth ──────────────────────────────────────────────
async function init() {
  const { data } = await sb.auth.getSession();
  if (!data.session) { window.location.href = 'index.html'; return; }

  accessToken = data.session.access_token;
  document.getElementById('sa-user-email').textContent = data.session.user.email || '—';

  document.getElementById('sa-logout-btn').onclick = async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  };

  // Verify super admin
  const { data: profile } = await sb.from('profiles').select('is_super_admin').eq('id', data.session.user.id).maybeSingle();
  if (!profile?.is_super_admin) {
    document.getElementById('loading-overlay').innerHTML = '<span style="color:#EF4444;font-weight:600;">Access denied — super admin only.</span>';
    return;
  }

  document.getElementById('loading-overlay').style.display = 'none';
  await loadTenants();
}

// ── Fetch all tenants ─────────────────────────────────
async function loadTenants() {
  document.getElementById('sa-tbody').innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:2rem">Loading…</td></tr>`;
  try {
    const res  = await fetch('/.netlify/functions/superadmin-stats', {
      headers: { 'Authorization': `Bearer ${accessToken}` },
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Failed to load');
    allTenants = json.tenants || [];
    renderSummary();
    renderTable(allTenants);
  } catch (err) {
    showToast(err.message, 'error');
    document.getElementById('sa-tbody').innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--red);padding:2rem">${err.message}</td></tr>`;
  }
}

// ── Summary cards ─────────────────────────────────────
function renderSummary() {
  const byPlan = t => allTenants.filter(x => x.plan === t).length;
  document.getElementById('sa-total').textContent     = allTenants.length;
  document.getElementById('sa-trial').textContent     = byPlan('trial');
  document.getElementById('sa-starter').textContent   = byPlan('starter');
  document.getElementById('sa-pro').textContent       = byPlan('pro');
  document.getElementById('sa-suspended').textContent = byPlan('suspended');
}

// ── Render table ──────────────────────────────────────
function renderTable(list) {
  const tbody = document.getElementById('sa-tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:2.5rem">No clients found</td></tr>`;
    return;
  }
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' }) : '—';
  const fmtMoney = n => n > 0 ? '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 }) : '—';

  tbody.innerHTML = list.map(t => {
    const planClass = `plan-${t.plan || 'trial'}`;
    const trialCell = t.trialDaysLeft !== null
      ? (t.trialDaysLeft === 0 ? '<span style="color:var(--red);font-weight:600;">Expired</span>' : `<strong>${t.trialDaysLeft}d</strong> left`)
      : '—';
    const ownerDisplay = t.owner_email || t.ownerName || '—';
    const lastSeen = t.lastBooking ? fmtDate(t.lastBooking) : (t.last_seen_at ? fmtDate(t.last_seen_at) : '—');
    const stripeLink = t.stripe_customer_id
      ? `<a href="https://dashboard.stripe.com/customers/${t.stripe_customer_id}" target="_blank" rel="noopener" class="btn btn-outline" style="padding:0.3rem 0.6rem;font-size:0.72rem;" title="Open in Stripe">Stripe ↗</a>`
      : '';
    return `
      <tr>
        <td>
          <div style="font-weight:600;">${esc(t.name || '—')}</div>
          <div style="font-size:0.72rem;color:var(--muted);">${esc(t.slug || '')}</div>
        </td>
        <td style="font-size:0.8rem;color:var(--muted);">${esc(ownerDisplay)}</td>
        <td><span class="plan-badge ${planClass}">${t.plan || 'trial'}</span></td>
        <td style="font-size:0.82rem;">${trialCell}</td>
        <td style="text-align:center;">${t.cars || 0}</td>
        <td style="text-align:center;">${t.bookings || 0}</td>
        <td style="font-weight:600;">${fmtMoney(t.monthlyRevenue)}</td>
        <td style="font-size:0.78rem;color:var(--muted);">${lastSeen}</td>
        <td style="font-size:0.78rem;color:var(--muted);">${fmtDate(t.created_at)}</td>
        <td>
          <div style="display:flex;gap:0.4rem;flex-wrap:nowrap;">
            ${stripeLink}
            <button class="btn btn-outline" onclick="openEdit('${t.id}')" style="padding:0.3rem 0.6rem;font-size:0.72rem;">Edit</button>
            ${t.plan !== 'suspended'
              ? `<button class="btn btn-danger" onclick="quickSuspend('${t.id}')" style="padding:0.3rem 0.6rem;font-size:0.72rem;">Suspend</button>`
              : `<button class="btn btn-green" onclick="quickActivate('${t.id}')" style="padding:0.3rem 0.6rem;font-size:0.72rem;">Activate</button>`}
          </div>
        </td>
      </tr>`;
  }).join('');
}

// ── Filter ────────────────────────────────────────────
function filterTable() {
  const q     = (document.getElementById('sa-search').value || '').toLowerCase();
  const plan  = document.getElementById('sa-plan-filter').value;
  const list  = allTenants.filter(t => {
    const matchPlan = plan ? t.plan === plan : true;
    const matchQ    = !q || (t.name || '').toLowerCase().includes(q)
      || (t.slug || '').toLowerCase().includes(q)
      || (t.owner_email || '').toLowerCase().includes(q)
      || (t.ownerName || '').toLowerCase().includes(q);
    return matchPlan && matchQ;
  });
  renderTable(list);
}

// ── Edit modal ────────────────────────────────────────
function openEdit(id) {
  const t = allTenants.find(x => x.id === id);
  if (!t) return;
  document.getElementById('edit-tenant-id').value  = t.id;
  document.getElementById('edit-modal-title').textContent = `Edit — ${t.name || 'Client'}`;
  document.getElementById('edit-name').value         = t.name        || '';
  document.getElementById('edit-owner-name').value   = t.owner_name  || t.ownerName || '';
  document.getElementById('edit-owner-email').value  = t.owner_email || '';
  document.getElementById('edit-owner-phone').value  = t.owner_phone || '';
  document.getElementById('edit-plan').value         = t.plan        || 'trial';
  document.getElementById('edit-notes').value        = t.notes       || '';
  document.getElementById('edit-modal').style.display = 'flex';
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

document.getElementById('edit-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('edit-submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const tenantId = document.getElementById('edit-tenant-id').value;
  const updates = {
    plan:        document.getElementById('edit-plan').value,
    owner_name:  document.getElementById('edit-owner-name').value.trim(),
    owner_email: document.getElementById('edit-owner-email').value.trim(),
    owner_phone: document.getElementById('edit-owner-phone').value.trim(),
    notes:       document.getElementById('edit-notes').value.trim(),
  };
  // Also update company name via direct Supabase (admin owns their tenant)
  const nameVal = document.getElementById('edit-name').value.trim();
  try {
    const res = await fetch('/.netlify/functions/superadmin-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
      body: JSON.stringify({ tenantId, updates: { ...updates } }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Update failed');

    // Update local state
    const idx = allTenants.findIndex(x => x.id === tenantId);
    if (idx !== -1) Object.assign(allTenants[idx], updates, { name: nameVal });

    closeModal('edit-modal');
    renderSummary();
    filterTable();
    showToast('Client updated.');
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
});

async function quickSuspend(id) {
  if (!confirm('Suspend this client? They will lose dashboard access.')) return;
  await patchTenant(id, { plan: 'suspended' });
}

async function quickActivate(id) {
  const plan = prompt('Activate with plan:', 'starter');
  if (!plan || !['trial','starter','pro'].includes(plan)) return;
  await patchTenant(id, { plan });
}

async function patchTenant(id, updates) {
  try {
    const res = await fetch('/.netlify/functions/superadmin-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
      body: JSON.stringify({ tenantId: id, updates }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Failed');
    const idx = allTenants.findIndex(x => x.id === id);
    if (idx !== -1) Object.assign(allTenants[idx], updates);
    renderSummary();
    filterTable();
    showToast('Updated.');
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ── Utilities ─────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3200);
}

init();
</script>
</body>
</html>
